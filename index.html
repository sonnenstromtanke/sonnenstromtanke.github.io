<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="☀️ SonnenStromTanke — Community-Hub für solar-betriebene öffentliche Wallboxen">
<meta property="og:image" content="https://sonnenstromtanke.github.io/knechtels/sunrise.png">
<meta property="og:url" content="https://sonnenstromtanke.github.io/">
<meta property="og:type" content="website">
<title>☀️ SonnenStromTanke</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f4f0;
    color: #333;
    line-height: 1.6;
  }
  .hero-img {
    display: block;
    margin: 0 auto;
    max-width: 100%;
    height: auto;
  }
  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 24px 20px;
  }
  h1 {
    font-size: 1.6em;
    color: #2d6a2e;
    margin-bottom: 16px;
    text-align: center;
  }
  .claim {
    text-align: center;
    font-size: 1.1em;
    color: #555;
    margin-bottom: 32px;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .card h2 {
    font-size: 1.1em;
    margin-bottom: 12px;
    color: #2d6a2e;
  }
  .members {
    list-style: none;
    padding: 0;
  }
  .members li {
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .members li:last-child {
    border-bottom: none;
  }
  .members a {
    font-weight: 600;
  }
  .members .meta {
    color: #888;
    font-size: 0.9em;
    margin-left: 8px;
  }
  a { color: #2d6a2e; }
  .footer {
    text-align: center;
    font-size: 0.75em;
    color: #aaa;
    margin-top: 24px;
  }
</style>
</head>
<body>
<img class="hero-img" src="knechtels/sunrise.png" alt="SonnenStromTanke">
<div class="container">
  <h1>☀️ SonnenStromTanke</h1>
  <p class="claim">Community-Hub für solar-betriebene öffentliche Wallboxen</p>

  <div class="card">
    <h2>Live-Stationen</h2>
    <ul class="members">
      <li>
        <a href="knechtels/">Knechtels</a>
        <span class="meta">Dresden</span>
      </li>
    </ul>
  </div>

  <div class="card">
    <h2>Im Aufbau</h2>
    <p>Mehr Infos folgen, sobald die Plattform für weitere Mitglieder geöffnet wird. Bei Interesse gerne <a href="mailto:sonnenstromtanke@icloud.com">Push Mail</a>.</p>
  </div>

  <p class="footer">Mit 💚 von <a href="https://github.com/martinknechtel">Martin</a> und seinen Code Agenten 🤖</p>
</div>
</body>
</html>
